<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070a18" />
    <!-- PWA / installable web app (required for push notifications on iOS) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ASCEND" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>ASCEND - Treating self improvement as game progression</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Cinzel:wght@600;800&display=swap"
      rel="stylesheet"
    />
    <!-- Apply the saved theme to <html> BEFORE first paint, so rune/olympus
         players don't see a flash of the default cosmos backdrop on load. -->
    <script>
      (function () {
        try {
          var sid = localStorage.getItem('ascend-session')
          if (!sid) return
          var raw = localStorage.getItem('ascend-save-' + sid)
          if (!raw) return
          var s = JSON.parse(raw)
          var theme = s && s.state && s.state.theme
          if (theme) document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
